<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スナバカフェ | 自家焙煎コーヒーと特製パフェ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>スナバカフェ</h1>
    <p>オーナー フィオナが贈る、至福の一杯</p>
</header>

<div class="container">
    <section id="about">
        <h2>About</h2>
        <div class="about-content">
            <div class="about-text">
                <p>店主のフィオナが自ら厳選し、<br>
                    丁寧に自家焙煎した豆を使用したコーヒーを提供しています。<br>
                    落ち着いた空間で、特別なひとときをお過ごしください。<br>
                    店頭ではコーヒー豆の販売も行っております。</p>
            </div>
            <div class="about-image">
                <img src="master-fiona.jpg" alt="スナバカフェ店主 フィオナ">
            </div>
        </div>
        </section>

    <section id="menu">
        <h2>Recommend Menu</h2>
        <div class="menu-item">
            <span>オリジナルコーヒー</span>
            <span>550円（税込）</span>
        </div>
        <div class="menu-item">
            <span>ナポリタン</span>
            <span>1,100円（税込）</span>
        </div>
        <p class="note">※その他、季節のメニューもございます。</p>
    </section>

    <section id="info">
        <h2>Information</h2>
        <table class="info-table">
            <tr>
                <th>営業時間</th>
                <td>12:00 〜 19:00</td>
            </tr>
            <tr>
                <th>定休日</th>
                <td>不定休</td>
            </tr>
            <tr>
                <th>備考</th>
                <td>コーヒー豆の販売あり</td>
            </tr>
        </table>
    </section>
</div>

<footer>
    &copy; 2026 スナバカフェ All Rights Reserved.
</footer>

</body>
</html>
