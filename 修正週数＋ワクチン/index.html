<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小児科向け 修正週数＆ワクチンガイド</title>
    <style>
        :root { --primary-color: #0076be; --bg-color: #f0f8ff; --accent-color: #d32f2f; }
        body { font-family: sans-serif; background-color: var(--bg-color); padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h2 { color: var(--primary-color); text-align: center; margin-top: 0; font-size: 1.3rem; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #777; font-size: 0.9rem; }
        .tab.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); font-weight: bold; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .row { display: flex; gap: 8px; }
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin-top: 10px; font-weight: bold; }
        
        #result-area { margin-top: 20px; display: none; }
        .age-box { padding: 15px; border-radius: 8px; background-color: #e7f3ff; border-left: 5px solid var(--primary-color); margin-bottom: 15px; }
        .result-label { font-size: 0.75rem; color: #666; }
        .result-val { font-weight: bold; color: var(--accent-color); font-size: 1.2rem; display: block; }
        
        .vaccine-box { font-size: 0.85rem; line-height: 1.4; }
        .vaccine-box h4 { margin: 15px 0 5px 0; font-size: 0.95rem; border-bottom: 1px solid #ddd; padding-bottom: 3px; }
        .v-list { list-style: none; padding-left: 0; margin: 0; }
        .v-item { margin-bottom: 8px; padding-left: 1.2rem; position: relative; }
        .v-item::before { content: "•"; position: absolute; left: 0; color: var(--primary-color); font-weight: bold; }
        .v-note { font-size: 0.75rem; color: #666; display: block; }
        
        .disclaimer { font-size: 0.7rem; color: #888; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>修正週数＆ワクチンガイド</h2>
    
    <div class="tabs">
        <div id="tab-gest" class="tab active" onclick="switchMode('gest')">在胎週数から</div>
        <div id="tab-due" class="tab" onclick="switchMode('due')">予定日から</div>
    </div>

    <div class="input-group">
        <label>誕生日</label>
        <input type="date" id="birthday">
    </div>

    <div id="mode-gest">
        <div class="input-group">
            <label>在胎週数</label>
            <div class="row">
                <input type="number" id="gestWeeks" placeholder="週" min="22" max="41">
                <input type="number" id="gestDays" placeholder="日" min="0" max="6" value="0">
            </div>
        </div>
    </div>

    <div id="mode-due" class="hidden">
        <div class="input-group">
            <label>出産予定日 (40週0日)</label>
            <input type="date" id="dueDate">
        </div>
    </div>

    <div class="input-group">
        <label>受診日</label>
        <input type="date" id="visitDate">
    </div>

    <button onclick="calculate()">計算する</button>

    <div id="result-area">
        <div class="age-box">
            <div style="margin-bottom: 10px;">
                <span class="result-label">暦上の月齢（生後日数）</span>
                <span id="actualAge" class="result-val"></span>
            </div>
            <div style="border-top: 1px solid #c8def0; padding-top: 10px;">
                <span class="result-label">修正月齢・週数</span>
                <span id="correctedAge" class="result-val"></span>
            </div>
        </div>

        <div class="vaccine-box" id="vaccine-result">
            </div>

        <div class="disclaimer">
            ※NPO法人「VPDを知って、子どもを守ろうの会」（2025年4月版）のスケジュールを参考にしています。<br>
            ※このアプリは目安を表示するものであり、実際の接種に関しては地域や流行状況に応じ、かかりつけ医と相談のうえスケジュールを立ててください。
        </div>
    </div>
</div>

<script>
    let currentMode = 'gest';

    window.onload = () => {
        document.getElementById('visitDate').valueAsDate = new Date();
    };

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('tab-gest').classList.toggle('active', mode === 'gest');
        document.getElementById('tab-due').classList.toggle('active', mode === 'due');
        document.getElementById('mode-gest').classList.toggle('hidden', mode !== 'gest');
        document.getElementById('mode-due').classList.toggle('hidden', mode !== 'due');
    }

    function calculate() {
        const birthdayInput = document.getElementById('birthday').value;
        const visitInput = document.getElementById('visitDate').value;
        
        if (!birthdayInput) { alert("誕生日を入力してください"); return; }
        const birthday = new Date(birthdayInput);
        const visitDate = new Date(visitInput);

        let pretermDays = 0;
        if (currentMode === 'gest') {
            const w = parseInt(document.getElementById('gestWeeks').value);
            const d = parseInt(document.getElementById('gestDays').value || 0);
            if (isNaN(w)) { alert("在胎週数を入力してください"); return; }
            pretermDays = 280 - (w * 7 + d);
        } else {
            const dueInput = document.getElementById('dueDate').value;
            if (!dueInput) { alert("予定日を入力してください"); return; }
            const dueDate = new Date(dueInput);
            pretermDays = Math.floor((dueDate - birthday) / (1000 * 60 * 60 * 24));
        }

        const actualTotalDays = Math.floor((visitDate - birthday) / (1000 * 60 * 60 * 24));
        const correctedTotalDays = actualTotalDays - pretermDays;

        const formatAge = (totalDays) => {
            if (totalDays < 0) return "予定日前です";
            const w = Math.floor(totalDays / 7);
            const d = totalDays % 7;
            const m = Math.floor(totalDays / 30.4375);
            return `${m}ヶ月 (${w}週${d}日) / 通算${totalDays}日`;
        };

        document.getElementById('result-area').style.display = 'block';
        document.getElementById('actualAge').innerText = formatAge(actualTotalDays);
        document.getElementById('correctedAge').innerText = formatAge(correctedTotalDays);

        displayVaccines(actualTotalDays);
    }

    function displayVaccines(days) {
        // 資料に基づき、より正確なメッセージに修正
        const vaccineList = [
            { name: "ロタウイルス", start: 42, end: 104, note: "遅くとも生後14週6日までに開始が必要" },
            { name: "五種混合 (1回目)", start: 60, end: 90, note: "生後2ヶ月になったらすぐに同時接種を推奨" },
            { name: "小児用肺炎球菌 (1回目)", start: 60, end: 90, note: "生後2ヶ月になったらすぐに同時接種を推奨" },
            { name: "B型肝炎 (1回目)", start: 60, end: 90, note: "0歳のうちに3回接種。生後2ヶ月から開始" },
            { name: "BCG", start: 150, end: 365, note: "生後5〜8ヶ月がおすすめの時期" },
            { name: "MR (第1期)", start: 365, end: 730, note: "1歳の誕生日が来たらすぐに同時接種を推奨" },
            { name: "水痘 (1回目)", start: 365, end: 730, note: "1歳の誕生日が来たらすぐに同時接種を推奨" },
            { name: "おたふくかぜ (任意)", start: 365, end: 730, note: "1歳の誕生日に同時接種で受けることを推奨" },
            { name: "日本脳炎", start: 180, end: 2737, note: "生後6ヶ月から定期接種可能（標準は3歳から）" }
        ];

        let currentHTML = "<h4 style='color:var(--accent-color);'>📌 接種対象・推奨時期</h4><ul class='v-list'>";
        let futureHTML = "<h4>⏳ 今後の予定</h4><ul class='v-list'>";
        let hasCurrent = false;

        vaccineList.forEach(v => {
            if (days >= v.start && days <= v.end) {
                currentHTML += `<li class='v-item'><b>${v.name}</b><span class='v-note'>${v.note}</span></li>`;
                hasCurrent = true;
            } else if (days < v.start) {
                const m = Math.floor(v.start / 30.4375);
                const displayMonth = m === 0 ? "生後すぐ" : `生後${m}ヶ月頃`;
                futureHTML += `<li class='v-item' style='color:#777;'>${v.name}<span class='v-note'>${displayMonth}〜</span></li>`;
            }
        });

        if (!hasCurrent) currentHTML += "<li class='v-item'>現在、推奨される新規ワクチンはありません</li>";

        document.getElementById('vaccine-result').innerHTML = currentHTML + "</ul>" + futureHTML + "</ul>";
    }
</script>

</body>
</html>
