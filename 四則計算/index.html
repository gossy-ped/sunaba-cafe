<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>算数プリントメーカー（一括生成・20問版）</title>
    <style>
        /* --- 画面表示用スタイル --- */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; background: #f0f0f0; padding: 20px; margin: 0; }
        .controls { background: white; padding: 20px; border-radius: 8px; max-width: 650px; margin: 0 auto 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls h2 { margin-top: 0; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 8px; }
        .setting-group { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .setting-label { font-weight: bold; display: block; margin-bottom: 8px; color: #555; }
        
        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
        input[type="number"] { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 80px; }
        .check-label { margin-right: 15px; cursor: pointer; }
        #serifList { width: 100%; box-sizing: border-box; height: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;}
        
        #imgPreviewContainer { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        .preview-thumb { width: 50px; height: 50px; object-fit: cover; border: 1px solid #ddd; }

        .btn-generate { background: #28a745; color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; box-shadow: 0 4px 0 #1e7e34; }
        .btn-generate:active { transform: translateY(2px); box-shadow: none; }

        /* --- プリント用スタイル --- */
        #outputArea { display: none; }
        .print-page { background: white; width: 210mm; height: 297mm; padding: 15mm; margin: 0 auto 20mm; box-sizing: border-box; position: relative; page-break-after: always; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .print-header { border-bottom: 2px solid #000; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 5px; }
        .title { font-size: 22px; font-weight: bold; }
        .name-box { border: 1px solid #000; width: 200px; height: 45px; display: flex; align-items: center; padding-left: 10px; }
        
        .problems-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 40px; }
        .problem { font-size: 24px; display: flex; align-items: center; white-space: nowrap; height: 48px; }
        .problem-num { font-size: 14px; margin-right: 10px; width: 25px; color: #666; text-align: right; }
        .ans-line { border-bottom: 1.5px solid #000; width: 80px; height: 28px; margin-left: 8px; }
        .answer-text { color: red; font-weight: bold; margin-left: 8px; display: none; }

        .chara-container { position: absolute; bottom: 10mm; right: 15mm; width: 250px; display: flex; align-items: flex-end; justify-content: flex-end; }
        .speech-bubble { position: relative; background: #fff; border: 1.5px solid #333; border-radius: 12px; padding: 8px 12px; margin-right: 10px; margin-bottom: 10px; max-width: 150px; font-size: 13px; z-index: 10; }
        .speech-bubble:after { content: ''; position: absolute; right: -14px; bottom: 6px; border-style: solid; border-width: 6px 0 6px 14px; border-color: transparent transparent transparent #333; }
        .chara-image { max-width: 60px; max-height: 70px; object-fit: contain; }

        @media print {
            .controls { display: none !important; }
            #outputArea { display: block !important; }
            .print-page { display: block !important; margin: 0; border: none; box-shadow: none; }
            .answer-page .answer-text { display: inline; }
            .answer-page .ans-line { display: none; }
            .answer-page .chara-container { display: none !important; }
        }
    </style>
</head>
<body>

<div class="controls">
    <h2>カスタム算数プリント（一括生成版）</h2>
    
    <div class="setting-group">
        <span class="setting-label">1. 演算の種類</span>
        <label class="check-label"><input type="checkbox" value="+" checked>＋</label>
        <label class="check-label"><input type="checkbox" value="-">－</label>
        <label class="check-label"><input type="checkbox" value="*">×</label>
        <label class="check-label"><input type="checkbox" value="/">÷</label>
    </div>
    
    <div class="input-row setting-group">
        <div><span class="setting-label">2. 桁数</span><input type="number" id="maxDigits" value="1" min="1" max="4"></div>
        <div><span class="setting-label">3. 項数</span><input type="number" id="numCount" value="2" min="2" max="4"></div>
        <div><span class="setting-label">4. 生成枚数</span><input type="number" id="pageCount" value="1" min="1" max="10"></div>
    </div>

    <div class="setting-group">
        <span class="setting-label">5. 答えの範囲</span>
        <div class="input-row">最小 <input type="number" id="minAns" value="0"> 〜 最大 <input type="number" id="maxAns" value="20"></div>
    </div>

    <div class="setting-group">
        <span class="setting-label">6. キャラ画像とセリフ</span>
        <input type="file" id="imageInput" accept="image/*" multiple onchange="previewImages()">
        <div id="imgPreviewContainer"></div>
        <textarea id="serifList" style="margin-top:10px;" placeholder="セリフを一行ずつ入力"></textarea>
    </div>
    
    <button class="btn-generate" onclick="generateAll()">プリントを一括生成して印刷</button>
</div>

<div id="outputArea"></div>

<script>
    let uploadedImages = [];
    function previewImages() {
        const fileInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('imgPreviewContainer');
        previewContainer.innerHTML = '';
        uploadedImages = [];
        if (fileInput.files) {
            Array.from(fileInput.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-thumb';
                    previewContainer.appendChild(img);
                    uploadedImages.push(e.target.result);
                }
                reader.readAsDataURL(file);
            });
        }
    }

    function generateAll() {
        const ops = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => el.value);
        const maxDigits = parseInt(document.getElementById('maxDigits').value);
        const numCount = parseInt(document.getElementById('numCount').value);
        const pageCount = parseInt(document.getElementById('pageCount').value);
        const minAns = parseInt(document.getElementById('minAns').value);
        const maxAns = parseInt(document.getElementById('maxAns').value);
        const serifs = document.getElementById('serifList').value.split('\n').filter(s => s.trim() !== '');

        if (ops.length === 0) { alert("演算を選んでください"); return; }

        const outputArea = document.getElementById('outputArea');
        outputArea.innerHTML = ''; // クリア

        const digitLimit = Math.pow(10, maxDigits);

        for (let p = 1; p <= pageCount; p++) {
            let probGridHtml = '';
            let ansGridHtml = '';

            for (let i = 1; i <= 20; i++) {
                let valid = false;
                let res = {};
                let att = 0;
                while (!valid && att < 100) {
                    att++;
                    let cur = Math.floor(Math.random() * digitLimit);
                    let exp = cur.toString();
                    for (let j = 1; j < numCount; j++) {
                        let op = ops[Math.floor(Math.random() * ops.length)];
                        let next = Math.floor(Math.random() * digitLimit);
                        if (op === '-') {
                            if (cur < next) next = Math.floor(Math.random() * (cur + 1));
                            cur -= next;
                        } else if (op === '+') cur += next;
                        else if (op === '*') cur *= next;
                        else if (op === '/') {
                            next = Math.floor(Math.random() * 8) + 2;
                            let ans = Math.floor(Math.random() * 10);
                            exp = (next * ans).toString(); cur = ans;
                        }
                        let sym = op==='*'?'×':op==='/'?'÷':op;
                        if (op !== '/') exp += ` ${sym} ${next}`;
                    }
                    if (cur >= minAns && cur <= maxAns) { res = { exp: exp, ans: cur }; valid = true; }
                }
                if (!valid) res = { exp: "1 + 1", ans: 2 };

                probGridHtml += `<div class="problem"><span class="problem-num">${i}.</span>${res.exp} = <div class="ans-line"></div></div>`;
                ansGridHtml += `<div class="problem"><span class="problem-num">${i}.</span>${res.exp} = <span class="answer-text">${res.ans}</span></div>`;
            }

            // キャラとセリフのランダム決定
            let charaHtml = '';
            if (uploadedImages.length > 0 && serifs.length > 0) {
                const img = uploadedImages[Math.floor(Math.random() * uploadedImages.length)];
                const txt = serifs[Math.floor(Math.random() * serifs.length)];
                charaHtml = `<div class="chara-container"><div class="speech-bubble">${txt}</div><img src="${img}" class="chara-image"></div>`;
            }

            // 問題ページ追加
            outputArea.innerHTML += `
                <div class="print-page">
                    <div class="print-header"><div class="title">さんすうプリント (${p}枚目)</div><div class="name-box">なまえ：</div></div>
                    <div class="problems-grid">${probGridHtml}</div>
                    ${charaHtml}
                </div>`;
            
            // 解答ページ追加
            outputArea.innerHTML += `
                <div class="print-page answer-page">
                    <div class="print-header"><div class="title">こたえ (${p}枚目)</div></div>
                    <div class="problems-grid">${ansGridHtml}</div>
                </div>`;
        }

        document.getElementById('outputArea').style.display = 'block';
        setTimeout(() => { window.print(); }, 500);
    }
</script>
</body>
</html>
